<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator etiketa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 25%),
        #0f172a;
      color: #e5e7eb;
      padding: 20px;
      margin: 0;
    }

    .box {
      max-width: 520px;
      margin: auto;
      background: rgba(17, 24, 39, 0.96);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.15);
      backdrop-filter: blur(8px);
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }

    .lang-btn {
      width: auto;
      padding: 8px 14px;
      margin-top: 0;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.25s ease;
    }

    .lang-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
    }

    .lang-btn.active {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: #2563eb;
      color: white;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 28px;
      letter-spacing: 0.2px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      background: #f8fafc;
      color: #111827;
      transition: transform 0.18s ease, box-shadow 0.25s ease, border 0.25s ease;
      border: 1px solid transparent;
    }

    input:focus {
      outline: none;
      transform: translateY(-1px);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
      border: 1px solid #60a5fa;
    }

    button {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.30);
    }

    button:active {
      transform: translateY(0);
    }

    .res,
    .suggestion {
      margin-top: 15px;
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      line-height: 1.7;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .res {
      min-height: 100px;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .res.updated,
    .suggestion.updated {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
    }

    .res::after,
    .suggestion::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
      transform: translateX(-120%);
      pointer-events: none;
    }

    .res.shine::after,
    .suggestion.shine::after {
      animation: shineMove 0.8s ease;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .suggestion {
      display: none;
      background: linear-gradient(180deg, #162132, #1e293b);
      border: 1px solid rgba(34, 197, 94, 0.18);
      border-left: 4px solid #22c55e;
    }

    .suggestion.show {
      display: block;
      animation: fadeSlideUp 0.35s ease;
    }

    .suggestion strong {
      color: #86efac;
    }

    .small-note {
      font-size: 13px;
      color: #93c5fd;
      margin-top: 8px;
    }

    .pill {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: rgba(34, 197, 94, 0.14);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shineMove {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(120%);
      }
    }
  </style>
</head>
<body>

<div class="box">
  <div class="topbar">
    <button type="button" class="lang-btn active" id="btn-hr" onclick="setLanguage('hr')">HR</button>
    <button type="button" class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
  </div>

  <h2 id="title">Kalkulator etiketa</h2>

  <div class="muted" id="desc">
    Unesi širinu X (max 320 mm), dužinu Y i količinu. Ubaciti dimenziju sa napustom, ako napust je nepoznat onda dodati 5mm
  </div>

  <input type="number" id="x" placeholder="X širina (mm)" inputmode="decimal" />
  <input type="number" id="y" placeholder="Y dužina (mm)" inputmode="decimal" />
  <input type="number" id="q" placeholder="Količina" inputmode="numeric" />

  <button type="button" id="calcBtn" onclick="calc()">Izračunaj</button>

  <div class="res" id="r">Rezultat će se prikazati ovdje.</div>
  <div class="suggestion" id="suggestion"></div>

  <div style="margin-top:15px;">
    <input type="email" id="email" placeholder="Upiši email za ponudu" />
    <button type="button" id="quoteBtn" onclick="sendQuote()">Zatraži ponudu</button>
  </div>
</div>

<script>
  // CIJENE - EDITIRAJ SAMO OVDJE
  const price_1000 = 14;
  const price_3000 = 10;
  const price_5000 = 8;
  const price_10000 = 6;

  // POSTAVKE
  const extraYmm = 15;
  const minOrderPrice = 100;

  let lastResult = "";
  let currentLang = "hr";

  const texts = {
    hr: {
      pageTitle: "Kalkulator etiketa",
      title: "Kalkulator etiketa",
      desc: "Unesi širinu X (max 320 mm), dužinu Y i količinu. Ubaciti dimenziju sa napustom, ako napust je nepoznat onda dodati 5mm",
      xPlaceholder: "X širina (mm)",
      yPlaceholder: "Y dužina (mm)",
      qPlaceholder: "Količina",
      calcBtn: "Izračunaj",
      resultDefault: "Rezultat će se prikazati ovdje.",
      emailPlaceholder: "Upiši email za ponudu",
      quoteBtn: "Zatraži ponudu",
      invalidInput: "Unesi sve podatke ispravno.",
      maxWidthError: "X širina etikete ne može biti veća od 320 mm.",
      alertEmail: "Upiši email.",
      alertCalcFirst: "Prvo klikni Izračunaj.",
      subject: "Upit za ponudu etiketa",
      bodyIntro: "Podaci:",
      customerEmail: "Email klijenta",
      x: "X",
      y: "Y",
      quantity: "Količina",
      perRow: "Kom/Red",
      rows: "Redovi",
      meters: "Metraža",
      pricePerMeter: "€/m",
      basePrice: "Osnovna cijena",
      smallQtyFee: "Dodatak za male količine",
      total: "Ukupno",
      perPiece: "€/kom",
      liveNote: "Izračun se osvježava automatski dok upisuješ.",
      suggestionTitle: "Optimizacija količine",
      suggestionNone: "Trenutna količina je već u optimalnom cjenovnom razredu.",
      nextTierAt: "Veća količina od",
      couldLower: "spušta cijenu na",
      savePerPiece: "ušteda po komadu",
      recommendation: "Preporuka",
      recommendationText: "isplati se provjeriti treba li ti malo veća količina zbog niže cijene po komadu.",
      savingsBadge: "Povoljniji rang"
    },
    en: {
      pageTitle: "Label Calculator",
      title: "Label Calculator",
      desc: "Enter width X (max 320 mm), length Y and quantity. Enter the size including bleed; if the bleed is unknown, add 5 mm.",
      xPlaceholder: "X width (mm)",
      yPlaceholder: "Y length (mm)",
      qPlaceholder: "Quantity",
      calcBtn: "Calculate",
      resultDefault: "The result will be shown here.",
      emailPlaceholder: "Enter email for quotation",
      quoteBtn: "Request quotation",
      invalidInput: "Please enter all data correctly.",
      maxWidthError: "Label width X cannot be greater than 320 mm.",
      alertEmail: "Please enter an email.",
      alertCalcFirst: "Please click Calculate first.",
      subject: "Label quotation request",
      bodyIntro: "Details:",
      customerEmail: "Customer email",
      x: "X",
      y: "Y",
      quantity: "Quantity",
      perRow: "Pieces/Row",
      rows: "Rows",
      meters: "Length",
      pricePerMeter: "€/m",
      basePrice: "Base price",
      smallQtyFee: "Small quantity surcharge",
      total: "Total",
      perPiece: "€/piece",
      liveNote: "Calculation updates automatically while you type.",
      suggestionTitle: "Quantity optimization",
      suggestionNone: "The current quantity is already in an optimal pricing tier.",
      nextTierAt: "A quantity above",
      couldLower: "reduces the price to",
      savePerPiece: "saving per piece",
      recommendation: "Recommendation",
      recommendationText: "it may be worth checking whether a slightly larger quantity makes sense due to the lower unit price.",
      savingsBadge: "Better price tier"
    }
  };

  function t(key) {
    return texts[currentLang][key];
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.title = t("pageTitle");

    document.getElementById("title").textContent = t("title");
    document.getElementById("desc").textContent = t("desc");
    document.getElementById("x").placeholder = t("xPlaceholder");
    document.getElementById("y").placeholder = t("yPlaceholder");
    document.getElementById("q").placeholder = t("qPlaceholder");
    document.getElementById("calcBtn").textContent = t("calcBtn");
    document.getElementById("email").placeholder = t("emailPlaceholder");
    document.getElementById("quoteBtn").textContent = t("quoteBtn");

    document.getElementById("btn-hr").classList.toggle("active", lang === "hr");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");

    const x = document.getElementById("x").value;
    const y = document.getElementById("y").value;
    const q = document.getElementById("q").value;

    if (!x && !y && !q) {
      document.getElementById("r").innerHTML = t("resultDefault");
      hideSuggestion();
      lastResult = "";
    } else {
      calc();
    }
  }

  function getPrice(q) {
    if (q <= 2999) return price_1000;
    if (q <= 4999) return price_3000;
    if (q <= 9999) return price_5000;
    return price_10000;
  }

  function getNextTier(q) {
    if (q <= 2999) return 3000;
    if (q <= 4999) return 5000;
    if (q <= 9999) return 10000;
    return null;
  }

  function calculateData(x, yInput, q) {
    const y = yInput + extraYmm;

    let perRow = Math.floor(300 / x);
    if (perRow < 1) perRow = 1;

    const rows = Math.ceil(q / perRow);
    const meters = (rows * y) / 1000;

    const price = getPrice(q);
    const baseTotal = meters * price;

    let total = baseTotal;

    if (q <= 400 && total < minOrderPrice) {
      total = minOrderPrice;
    }

    const extraFee = total - baseTotal;
    const perPiece = total / q;

    return {
      x,
      yInput,
      y,
      q,
      perRow,
      rows,
      meters,
      price,
      baseTotal,
      total,
      extraFee,
      perPiece
    };
  }

  function animateBox(el) {
    el.classList.remove("updated", "shine");
    void el.offsetWidth;
    el.classList.add("updated", "shine");
    setTimeout(() => {
      el.classList.remove("updated", "shine");
    }, 850);
  }

  function showSuggestion(x, yInput, q, currentData) {
    const box = document.getElementById("suggestion");
    const nextTier = getNextTier(q);

    if (!nextTier) {
      box.innerHTML =
        "<strong>" + t("suggestionTitle") + ":</strong><br>" +
        t("suggestionNone");
      box.classList.add("show");
      animateBox(box);
      return;
    }

    const nextData = calculateData(x, yInput, nextTier);
    const perPieceSaving = currentData.perPiece - nextData.perPiece;

    if (perPieceSaving <= 0) {
      box.innerHTML =
        "<strong>" + t("suggestionTitle") + ":</strong><br>" +
        t("suggestionNone");
      box.classList.add("show");
      animateBox(box);
      return;
    }

    box.innerHTML =
      "<strong>" + t("suggestionTitle") + ":</strong><br>" +
      t("nextTierAt") + " <b>" + nextTier + "</b> " + t("couldLower") + " <b>" + nextData.perPiece.toFixed(4) + " €</b>.<br>" +
      t("savePerPiece") + ": <b>" + perPieceSaving.toFixed(4) + " €</b><br>" +
      "<span class='pill'>" + t("savingsBadge") + "</span>" +
      "<div class='small-note'>" + t("recommendation") + ": " + t("recommendationText") + "</div>";

    box.classList.add("show");
    animateBox(box);
  }

  function hideSuggestion() {
    const box = document.getElementById("suggestion");
    box.classList.remove("show");
    box.innerHTML = "";
  }

  function calc() {
    const r = document.getElementById("r");

    const x = parseFloat(document.getElementById("x").value);
    const yInput = parseFloat(document.getElementById("y").value);
    const q = parseInt(document.getElementById("q").value, 10);

    if (!x && !yInput && !q) {
      r.innerHTML = t("resultDefault");
      lastResult = "";
      hideSuggestion();
      return;
    }

    if (!x || !yInput || !q || x <= 0 || yInput <= 0 || q <= 0) {
      r.innerHTML = t("invalidInput");
      lastResult = "";
      hideSuggestion();
      animateBox(r);
      return;
    }

    if (x > 320) {
      r.innerHTML = t("maxWidthError");
      lastResult = "";
      hideSuggestion();
      animateBox(r);
      return;
    }

    const data = calculateData(x, yInput, q);

    lastResult =
      t("x") + ": " + x + " mm\n" +
      t("y") + ": " + yInput + " mm (+" + extraYmm + " = " + data.y + " mm)\n" +
      t("quantity") + ": " + q + "\n" +
      t("perRow") + ": " + data.perRow + "\n" +
      t("rows") + ": " + data.rows + "\n" +
      t("meters") + ": " + data.meters.toFixed(2) + " m\n" +
      t("basePrice") + ": " + data.baseTotal.toFixed(2) + " €\n" +
      t("smallQtyFee") + ": " + data.extraFee.toFixed(2) + " €\n" +
      t("total") + ": " + data.total.toFixed(2) + " €\n" +
      t("perPiece") + ": " + data.perPiece.toFixed(4);

    r.innerHTML =
      t("perRow") + ": <b>" + data.perRow + "</b><br>" +
      t("rows") + ": <b>" + data.rows + "</b><br>" +
      t("meters") + ": <b>" + data.meters.toFixed(2) + " m</b><br>" +
      t("pricePerMeter") + ": <b>" + data.price.toFixed(2) + "</b><br>" +
      t("basePrice") + ": <b>" + data.baseTotal.toFixed(2) + " €</b><br>" +
      t("smallQtyFee") + ": <b>" + data.extraFee.toFixed(2) + " €</b><br>" +
      t("total") + ": <b>" + data.total.toFixed(2) + " €</b><br>" +
      t("perPiece") + ": <b>" + data.perPiece.toFixed(4) + "</b>" +
      "<div class='small-note'>" + t("liveNote") + "</div>";

    animateBox(r);
    showSuggestion(x, yInput, q, data);
  }

  function sendQuote() {
    const email = document.getElementById("email").value;

    if (!email) {
      alert(t("alertEmail"));
      return;
    }

    if (!lastResult) {
      alert(t("alertCalcFirst"));
      return;
    }

    const subject = encodeURIComponent(t("subject"));
    const body = encodeURIComponent(
      t("bodyIntro") + "\n\n" +
      lastResult +
      "\n\n" +
      t("customerEmail") + ": " + email
    );

    window.location.href =
      "mailto:matija@mgc-design.com?subject=" + subject + "&body=" + body;
  }

  // REAL-TIME IZRAČUN
  ["x", "y", "q"].forEach(id => {
    document.getElementById(id).addEventListener("input", calc);
  });

  setLanguage("hr");
</script>

</body>
</html>
