<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator etiketa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 20px;
      margin: 0;
    }

    .box {
      max-width: 520px;
      margin: auto;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      margin-top: 0;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      background: #f8fafc;
      color: #111827;
    }

    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .res {
      margin-top: 15px;
      background: #1f2937;
      padding: 15px;
      border-radius: 8px;
      line-height: 1.7;
      min-height: 80px;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Kalkulator etiketa</h2>
  <div class="muted">
    Unesi širinu X (max 320 mm), dužinu Y i količinu.
  </div>

  <input type="number" id="x" placeholder="X širina (mm)" inputmode="decimal" />
  <input type="number" id="y" placeholder="Y dužina (mm)" inputmode="decimal" />
  <input type="number" id="q" placeholder="Količina" inputmode="numeric" />

  <button type="button" onclick="calc()">Izračunaj</button>

  <div class="res" id="r">Rezultat će se prikazati ovdje.</div>

  <div style="margin-top:15px;">
    <input type="email" id="email" placeholder="Upiši email za ponudu" />
    <button type="button" onclick="sendQuote()">Zatraži ponudu</button>
  </div>
</div>

<script>
  // CIJENE - EDITIRAJ SAMO OVDJE
  const price_1000 = 14;
  const price_3000 = 10;
  const price_5000 = 8;
  const price_10000 = 6;

  // POSTAVKE
  const extraYmm = 15;
  const minOrderPrice = 100;

  let lastResult = "";

  function getPrice(q) {
    if (q <= 2999) return price_1000;
    if (q <= 4999) return price_3000;
    if (q <= 9999) return price_5000;
    return price_10000;
  }

  function calc() {
    const r = document.getElementById("r");

    const x = parseFloat(document.getElementById("x").value);
    const yInput = parseFloat(document.getElementById("y").value);
    const q = parseInt(document.getElementById("q").value, 10);

    if (!x || !yInput || !q || x <= 0 || yInput <= 0 || q <= 0) {
      r.innerHTML = "Unesi sve podatke ispravno.";
      lastResult = "";
      return;
    }

    if (x > 320) {
      r.innerHTML = "X širina etikete ne može biti veća od 320 mm.";
      lastResult = "";
      return;
    }

    const y = yInput + extraYmm;

    let perRow = Math.floor(300 / x);
    if (perRow < 1) perRow = 1;

    const rows = Math.ceil(q / perRow);
    const meters = (rows * y) / 1000;

    const price = getPrice(q);
    const baseTotal = meters * price;

    let total = baseTotal;

    // Minimalna cijena za male količine
    if (q <= 400 && total < minOrderPrice) {
      total = minOrderPrice;
    }

    const extraFee = total - baseTotal;
    const perPiece = total / q;

    lastResult =
      "X: " + x + " mm\n" +
      "Y: " + yInput + " mm (+15 = " + y + " mm)\n" +
      "Količina: " + q + "\n" +
      "Kom/Red: " + perRow + "\n" +
      "Redovi: " + rows + "\n" +
      "Metraža: " + meters.toFixed(2) + " m\n" +
      "Osnovna cijena: " + baseTotal.toFixed(2) + " €\n" +
      "Dodatak za male količine: " + extraFee.toFixed(2) + " €\n" +
      "Ukupno: " + total.toFixed(2) + " €\n" +
      "€/kom: " + perPiece.toFixed(4);

    r.innerHTML =
      "Kom/Red: <b>" + perRow + "</b><br>" +
      "Redovi: <b>" + rows + "</b><br>" +
      "Metraža: <b>" + meters.toFixed(2) + " m</b><br>" +
      "€/m: <b>" + price.toFixed(2) + "</b><br>" +
      "Osnovna cijena: <b>" + baseTotal.toFixed(2) + " €</b><br>" +
      "Dodatak za male količine: <b>" + extraFee.toFixed(2) + " €</b><br>" +
      "Ukupno: <b>" + total.toFixed(2) + " €</b><br>" +
      "€/kom: <b>" + perPiece.toFixed(4) + "</b>";
  }

  function sendQuote() {
    const email = document.getElementById("email").value;

    if (!email) {
      alert("Upiši email.");
      return;
    }

    if (!lastResult) {
      alert("Prvo klikni Izračunaj.");
      return;
    }

    const subject = encodeURIComponent("Upit za ponudu etiketa");
    const body = encodeURIComponent(
      "Podaci:\n\n" +
      lastResult +
      "\n\nEmail klijenta: " + email
    );

    window.location.href =
      "mailto:matija@mgc-design.com?subject=" + subject + "&body=" + body;
  }
</script>

</body>
</html>
